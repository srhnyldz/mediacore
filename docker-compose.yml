services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ylz-mediacore-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - downloads_data:/tmp/downloads
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: ylz-mediacore-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - downloads_data:/tmp/downloads
    depends_on:
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - app.workers.worker.celery_app
      - worker
      - --loglevel=info
      - --queues=download,convert

  redis:
    image: redis:7-alpine
    container_name: ylz-mediacore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  downloads_data:
  redis_data:
